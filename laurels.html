<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCAP Productions — Festival Laurels</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0e; color: #888; font-family: Arial, sans-serif; padding: 3rem 2rem; }
  h1 { font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase; color: #c9a84c; margin-bottom: 0.3rem; font-weight: 300; }
  .sub { font-size: 0.68rem; color: #333; margin-bottom: 3rem; }
  .cat { margin-bottom: 4rem; }
  .cat-title {
    font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: #333; margin-bottom: 1.5rem; padding-bottom: 0.8rem;
    border-bottom: 1px solid #161620; display: flex; align-items: center; gap: 0.7rem;
  }
  .badge { padding: 0.15rem 0.6rem; font-size: 0.55rem; letter-spacing: 0.15em; }
  .bw { background:#c9a84c; color:#000; }
  .bf { background:#606080; color:#fff; }
  .bs { background:#1a2530; color:#5a7a8a; }
  .grid { display: flex; flex-wrap: wrap; gap: 0.6rem; }
  .lw { text-align: center; }
  .lw svg { display: block; width: 200px; height: 150px; }
  .ln { font-size: 0.52rem; letter-spacing: 0.08em; text-transform: uppercase; color: #2a2a2a; margin-top: 0.3rem; line-height: 1.4; }
  .dl {
    margin-top: 0.3rem; display: inline-block;
    font-size: 0.5rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: #222; border: 1px solid #1a1a1a; padding: 0.18rem 0.5rem;
    cursor: pointer; background: transparent; font-family: inherit;
    transition: all .15s;
  }
  .dl:hover { border-color:#c9a84c; color:#c9a84c; }
  footer { margin-top: 3rem; font-size: 0.6rem; color: #222; border-top: 1px solid #111; padding-top: 1.5rem; }
</style>
</head>
<body>

<h1>CCAP Productions — Festival Laurels</h1>
<p class="sub">Private Limo (2022 – present)</p>

<div class="cat">
  <div class="cat-title"><span class="badge bw">Award Winner</span>6 awards</div>
  <div class="grid" id="winners"></div>
</div>
<div class="cat">
  <div class="cat-title"><span class="badge bf">Finalist</span>2 finalists</div>
  <div class="grid" id="finalists"></div>
</div>
<div class="cat">
  <div class="cat-title"><span class="badge bs">Official Selection</span>9 selections</div>
  <div class="grid" id="selections"></div>
</div>

<footer>Right-click any laurel → Save image as… &nbsp;|&nbsp; Or use the ↓ buttons to download individual SVG files.</footer>

<script>
/* ─────────────────────────────────────────────────────────────────
   BEZIER HELPERS
───────────────────────────────────────────────────────────────── */
function bezPt(P, t) {
  const [p0,p1,p2,p3] = P, u = 1-t;
  return [
    u*u*u*p0[0] + 3*u*u*t*p1[0] + 3*u*t*t*p2[0] + t*t*t*p3[0],
    u*u*u*p0[1] + 3*u*u*t*p1[1] + 3*u*t*t*p2[1] + t*t*t*p3[1]
  ];
}

/* ─────────────────────────────────────────────────────────────────
   BRANCH GEOMETRY  (600 × 450 viewBox)

   The LEFT branch has two parts:
   1. A decorative bottom scroll (visible stem curl, no leaves)
   2. The main leaf-bearing stem from (282,416) up to (68,50)

   The RIGHT branch is the horizontal mirror (x → 600-x).
───────────────────────────────────────────────────────────────── */
const N = 13;                         // leaves per branch

// Main leaf-bearing stem control points (left side)
const STEM_L = [
  [282, 416],   // P0 – start of leaf stem (top of left scroll)
  [158, 380],   // P1 – pull quickly to the left
  [ 42, 210],   // P2 – upper-left sweep
  [ 68,  50],   // P3 – tip (upper left)
];

// Sample N evenly-spaced points along the stem
const leftPts  = Array.from({length:N}, (_,i) => bezPt(STEM_L, (i+0.5)/N));
const rightPts = leftPts.map(([x,y]) => [600-x, y]);   // mirror

/* ─────────────────────────────────────────────────────────────────
   LEAF ROTATION
   The leaf path has its base at origin and tip pointing UP (−y).
   To make the tip point OUTWARD from the wreath centre (CX,CY):
     angle = atan2(y−CY, x−CX)   ← direction from centre to leaf base
     rotation = angle + 90°       ← turns the upward tip to face outward
───────────────────────────────────────────────────────────────── */
const CX = 300, CY = 218;   // wreath centre (roughly mid text area)

function leafRot(x, y) {
  const deg = Math.atan2(y - CY, x - CX) * 180 / Math.PI;
  return ((deg + 90) + 360) % 360;
}

/* ─────────────────────────────────────────────────────────────────
   LEAF PATH
   Smooth oval / pointed-tip shape matching the sample.
   Base at (0,0), tip at (0,−30).  Width ≈ 14 px at mid-point.
───────────────────────────────────────────────────────────────── */
const LEAF = 'M 0,0 C -7,-3 -7,-17 0,-30 C 7,-17 7,-3 0,0 Z';

function mkLeaf(x, y, col) {
  const r = leafRot(x, y).toFixed(1);
  return `<path d="${LEAF}" transform="translate(${x.toFixed(1)},${y.toFixed(1)}) rotate(${r})" fill="${col}"/>`;
}

/* ─────────────────────────────────────────────────────────────────
   SVG BUILDER
───────────────────────────────────────────────────────────────── */
function makeLaurel({ type, lines, year }) {

  // All laurels match the sample: black on white
  const C   = '#111111';   // leaf & text colour
  const BG  = '#FFFFFF';   // background

  const LABEL = { winner:'AWARD WINNER', finalist:'FINALIST', selection:'OFFICIAL SELECTION' }[type];

  // ── leaves ──
  const leaves = [
    ...leftPts.map( ([x,y]) => mkLeaf(x,     y, C) ),
    ...rightPts.map(([x,y]) => mkLeaf(x,     y, C) ),
  ].join('');

  // ── leaf-bearing stems (thin line behind the leaves) ──
  const stems = `
  <path d="M 282,416 C 158,380 42,210 68,50"
        fill="none" stroke="${C}" stroke-width="1.2" opacity="0.45"/>
  <path d="M 318,416 C 442,380 558,210 532,50"
        fill="none" stroke="${C}" stroke-width="1.2" opacity="0.45"/>`;

  // ── bottom scrolls ──
  // Each scroll is a graceful C-curve that swoops downward from the
  // branch root and curls back up — exactly like the sample laurel.
  const scrolls = `
  <path d="M 285,414 C 248,428 204,450 212,436 C 220,422 258,418 284,415"
        fill="none" stroke="${C}" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 315,414 C 352,428 396,450 388,436 C 380,422 342,418 316,415"
        fill="none" stroke="${C}" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>`;

  // ── text ──
  // Adaptive font size based on longest line length
  const maxLen = Math.max(...lines.map(l => l.replace(/&amp;/g,'&').length));
  const nfs = maxLen <= 9  ? 52
            : maxLen <= 12 ? 46
            : maxLen <= 15 ? 38
            :                32;

  const two  = lines.length === 2;
  const labelY = 108;
  const n1Y    = two ? 186 : 222;
  const n2Y    = n1Y + nfs * 1.18;
  const yearY  = two ? n2Y + 56 : n1Y + 60;

  const text = `
  <text x="300" y="${labelY}" text-anchor="middle"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="17" letter-spacing="5" fill="${C}" font-weight="400">${LABEL}</text>
  <text x="300" y="${n1Y}" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="${nfs}" font-weight="bold" fill="${C}">${lines[0]}</text>
  ${lines[1] ? `<text x="300" y="${n2Y.toFixed(0)}" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="${nfs}" font-weight="bold" fill="${C}">${lines[1]}</text>` : ''}
  <text x="300" y="${yearY.toFixed(0)}" text-anchor="middle"
        font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
        font-size="21" letter-spacing="7" fill="${C}">${year}</text>`;

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <rect width="600" height="450" fill="${BG}"/>
  ${stems}
  ${leaves}
  ${scrolls}
  ${text}
</svg>`;
}

/* ─────────────────────────────────────────────────────────────────
   DATA
───────────────────────────────────────────────────────────────── */
const FESTIVALS = {
  winners: [
    { type:'winner', lines:['Portland Comedy',  'Film Festival'],     year:'2023', file:'winner-portland-2023'        },
    { type:'winner', lines:['Hollywood Best',   'Indie Film Awards'], year:'2026', file:'winner-hollywood-best-2026'  },
    { type:'winner', lines:['LA Film &amp;',    'Documentary Award'], year:'2026', file:'winner-la-doc-2026'          },
    { type:'winner', lines:['New York Film &amp;','Actress Award'],   year:'2026', file:'winner-ny-actress-2026'      },
    { type:'winner', lines:["Hollywood Int'l",  'Indie Film Awards'], year:'2026', file:'winner-hollywood-intl-2026'  },
    { type:'winner', lines:['Tokyo Film &amp;', 'Screenplay Awards'], year:'2026', file:'winner-tokyo-2026'           },
  ],
  finalists: [
    { type:'finalist', lines:['Portland Comedy', 'Film Festival'],    year:'2023', file:'finalist-portland-2023'      },
    { type:'finalist', lines:['Houston Comedy',  'Film Festival'],    year:'2023', file:'finalist-houston-2023'       },
  ],
  selections: [
    { type:'selection', lines:['Los Angeles',      'Short Film Award'],  year:'2026', file:'sel-la-short-2026'        },
    { type:'selection', lines:['Canadian Tamil',   'Film Festival'],     year:'2025', file:'sel-canadian-tamil-a-2025'},
    { type:'selection', lines:['Canadian Tamil',   'Film Festival'],     year:'2025', file:'sel-canadian-tamil-b-2025'},
    { type:'selection', lines:['Niagara Canada',   'Film Festival'],     year:'2025', file:'sel-niagara-2025'         },
    { type:'selection', lines:['Pickering Canada', 'Film Festival'],     year:'2025', file:'sel-pickering-2025'       },
    { type:'selection', lines:['Portland Comedy',  'Film Festival'],     year:'2024', file:'sel-portland-2024'        },
    { type:'selection', lines:['Pickering Canada', 'Film Festival'],     year:'2024', file:'sel-pickering-2024'       },
    { type:'selection', lines:['Toronto',          'Film Awards'],       year:'2024', file:'sel-toronto-2024'         },
    { type:'selection', lines:['Niagara Canada',   'Film Festival'],     year:'2024', file:'sel-niagara-2024'         },
  ],
};

/* ─────────────────────────────────────────────────────────────────
   RENDER
───────────────────────────────────────────────────────────────── */
function dlSVG(svg, name) {
  const blob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>\n' + svg], {type:'image/svg+xml'});
  const a = Object.assign(document.createElement('a'), {href:URL.createObjectURL(blob), download:name+'.svg'});
  a.click();
}

function renderGroup(items, id) {
  const el = document.getElementById(id);
  items.forEach(item => {
    const svg = makeLaurel(item);
    const w   = document.createElement('div');
    w.className = 'lw';
    w.innerHTML = svg +
      `<div class="ln">${item.lines.join(' · ')} ${item.year}</div>` +
      `<button class="dl">↓ SVG</button>`;
    w.querySelector('button').onclick = () => dlSVG(svg, item.file);
    el.appendChild(w);
  });
}

renderGroup(FESTIVALS.winners,    'winners');
renderGroup(FESTIVALS.finalists,  'finalists');
renderGroup(FESTIVALS.selections, 'selections');
</script>
</body>
</html>
